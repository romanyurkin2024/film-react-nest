name: Build & Push to GHCR

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'
    tags:
      - '**'

permissions:
  contents: read
  packages: write  
  
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} 

    - name: Build & Push Backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: ghcr.io/romanyurkin/film-backend:latest

    - name: Build & Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: ghcr.io/romanyurkin/film-frontend:latest

    - name: Build & Push Nginx
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        push: true
        tags: ghcr.io/romanyurkin/film-nginx:latest
