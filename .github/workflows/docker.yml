name: Build & Push to GHCR

on:
  push:
    branches: [ review-2, main ]
  pull_request:
    branches: [ review-2, main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & Push Backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        platforms: linux/amd64
        push: true
        tags: ghcr.io/romanyurkin2024/film-backend:latest

    - name: Build & Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        platforms: linux/amd64
        push: true
        tags: ghcr.io/romanyurkin2024/film-frontend:latest

    - name: Build & Push Nginx
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        platforms: linux/amd64
        push: true
        tags: ghcr.io/romanyurkin2024/film-nginx:latest
